services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_DB: hr_system
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d hr_system"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal
    # Postgres intentionally NOT exposed to host — internal network only (152-ФЗ / security).

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env.prod
    # Phase 14 — Assessment System requires GEMINI_API_KEY (Gemini 2.0 Flash
    # evaluator) and ASSESSMENT_SYSTEM_ENABLED=true to be set in .env.prod.
    # See backend/.env.example for the full list of supported variables.
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    # Migrations are run by scripts/deploy.sh, NOT by this service on startup.

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    networks:
      - internal

  # Public careers landing (Astro static site, served by Caddy via reverse proxy).
  # Gated at the backend layer by CAREERS_PAGE_ENABLED — when off, /api/public/*
  # returns 404 and the marketing site stays up but its apply form gets a 404.
  landing:
    build:
      context: .
      dockerfile: Dockerfile.landing
    restart: unless-stopped
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      - backend
      - web
      - landing

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
