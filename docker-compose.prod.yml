services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_DB: hr_system
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d hr_system"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal
    # Postgres intentionally NOT exposed to host — internal network only (152-ФЗ / security).

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env.prod
    # Phase 14 — Assessment System requires GEMINI_API_KEY (Gemini 2.0 Flash
    # evaluator) and ASSESSMENT_SYSTEM_ENABLED=true to be set in .env.prod.
    # See backend/.env.example for the full list of supported variables.
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    # Migrations are run by scripts/deploy.sh, NOT by this service on startup.

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["bun", "backend/src/worker.ts"]
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  cron:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /tmp/crontabs
        cat >/tmp/crontabs/root <<EOF
        SHELL=/bin/sh
        PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        ${CRON_ANALYTICS_SNAPSHOT_SCHEDULE:-0 1 * * *} /app/backend/scripts/run-cron-task.sh analytics.snapshot >> /proc/1/fd/1 2>&1
        ${CRON_PROBATION_REMINDER_SCHEDULE:-15 1 * * *} /app/backend/scripts/run-cron-task.sh probation.reminder >> /proc/1/fd/1 2>&1
        ${CRON_ONE_ON_ONE_REMINDER_SCHEDULE:-30 1 * * *} /app/backend/scripts/run-cron-task.sh 1on1.reminder >> /proc/1/fd/1 2>&1
        ${CRON_REVIEW_REMINDER_SCHEDULE:-45 1 * * *} /app/backend/scripts/run-cron-task.sh review.reminder >> /proc/1/fd/1 2>&1
        ${CRON_DATA_RETENTION_SCHEDULE:-0 2 * * *} /app/backend/scripts/run-cron-task.sh data.retention >> /proc/1/fd/1 2>&1
        ${CRON_SIGNALS_COMPUTE_SCHEDULE:-15 2 * * *} /app/backend/scripts/run-cron-task.sh signals.compute >> /proc/1/fd/1 2>&1
        ${CRON_SELECTION_RETENTION_OUTCOMES_SCHEDULE:-30 2 * * *} /app/backend/scripts/run-cron-task.sh selection.retention_outcomes >> /proc/1/fd/1 2>&1
        ${CRON_SELECTION_RETENTION_CALIBRATION_SCHEDULE:-45 2 * * 1} /app/backend/scripts/run-cron-task.sh selection.retention_calibration >> /proc/1/fd/1 2>&1
        ${CRON_OKR_QUARTER_START_SCHEDULE:-0 3 1 1,4,7,10 *} /app/backend/scripts/run-cron-task.sh okr.quarter_start >> /proc/1/fd/1 2>&1
        ${CRON_HH_SOURCING_SCHEDULE:-15 3 * * *} /app/backend/scripts/run-cron-task.sh hh.sourcing >> /proc/1/fd/1 2>&1
        EOF
        exec crond -f -l 8 -c /tmp/crontabs
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    networks:
      - internal

  # Public careers landing (Astro static site, served by Caddy via reverse proxy).
  # Gated at the backend layer by CAREERS_PAGE_ENABLED — when off, /api/public/*
  # returns 404 and the marketing site stays up but its apply form gets a 404.
  landing:
    build:
      context: .
      dockerfile: Dockerfile.landing
    restart: unless-stopped
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      - backend
      - web
      - landing

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
