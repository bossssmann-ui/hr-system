name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Contract tests
        run: bun run test:contracts

      - name: Web client tests
        run: bun run test:web

      - name: Mobile client tests
        run: bun run test:mobile

      - name: Backend tests
        run: bun run test:backend

      - name: Install Playwright browser
        run: bun run --cwd web e2e:install

      - name: Web E2E smoke
        run: bun run e2e:web

  backend-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    # Phase 0 integration suite covers auth + RLS scenarios against a real
    # PostgreSQL. The job uses the same Docker Compose service as local dev to
    # keep schemas/migrations identical.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: superuser
          POSTGRES_PASSWORD: superpassword
          POSTGRES_DB: web_app_demo_test
        ports:
          - 54330:5432
        options: >-
          --health-cmd "pg_isready -U superuser -d web_app_demo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql://superuser:superpassword@localhost:54330/web_app_demo_test?schema=public
      DATABASE_URL: postgresql://superuser:superpassword@localhost:54330/web_app_demo_test?schema=public
      JWT_SECRET: ci-test-secret-must-be-at-least-32-characters-long
      TEST_SKIP_DOCKER: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run --cwd backend prisma:generate

      - name: Apply migrations
        run: bun run --cwd backend prisma:deploy

      - name: Backend integration tests
        run: bun run test:backend:integration
